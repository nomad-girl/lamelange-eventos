<!DOCTYPE html>
<html lang="es-AR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planilla de stock — La Melange (en vivo)</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root{ --ink:#1c1c1c; --slate:#2c3e50; --line:#e7e3dc; --sand:#faf8f4; --muead:#8a8276; --gold:#b8924b; }
    *{ box-sizing:border-box; }
    body{ margin:0; font-family:'Montserrat',sans-serif; color:var(--ink); background:#fff; -webkit-font-smoothing:antialiased; }
    .top{ position:sticky; top:0; z-index:5; background:rgba(255,255,255,.94); backdrop-filter:blur(6px); border-bottom:1px solid var(--line); padding:18px 28px; display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
    .top h1{ font-family:'Playfair Display',serif; font-weight:700; font-size:24px; margin:0; }
    .top h1 small{ display:block; font-family:'Montserrat'; font-weight:400; font-size:12px; color:var(--muead); letter-spacing:.04em; }
    .live{ display:inline-flex; align-items:center; gap:7px; font-size:12px; color:var(--muead); }
    .dot{ width:9px; height:9px; border-radius:50%; background:#3ba35a; box-shadow:0 0 0 0 rgba(59,163,90,.6); animation:pulse 1.8s infinite; }
    @keyframes pulse{ 0%{box-shadow:0 0 0 0 rgba(59,163,90,.5)} 70%{box-shadow:0 0 0 8px rgba(59,163,90,0)} 100%{box-shadow:0 0 0 0 rgba(59,163,90,0)} }
    .stats{ margin-left:auto; display:flex; gap:22px; font-size:12px; color:var(--muead); }
    .stats b{ color:var(--ink); font-weight:600; font-size:15px; display:block; }
    .wrap{ padding:10px 28px 80px; }
    .cat{ margin-top:38px; }
    .cat__h{ font-family:'Playfair Display',serif; font-size:19px; font-weight:700; color:var(--slate); border-bottom:2px solid var(--slate); padding-bottom:7px; margin:0 0 4px; display:flex; align-items:baseline; gap:12px; }
    .cat__h span{ font-family:'Montserrat'; font-size:12px; font-weight:400; color:var(--muead); }
    table{ width:100%; border-collapse:collapse; font-size:13.5px; }
    th{ text-align:left; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muead); padding:10px 12px; border-bottom:1px solid var(--line); }
    td{ padding:10px 12px; border-bottom:1px solid var(--sand); vertical-align:top; }
    tr:hover td{ background:var(--sand); }
    .modelo{ font-weight:500; }
    .stock{ font-variant-numeric:tabular-nums; font-weight:600; }
    .stock.empty{ color:#cbb6a0; font-weight:400; }
    .chip{ display:inline-block; font-size:10.5px; padding:2px 8px; border-radius:20px; line-height:1.5; }
    .chip--mm{ background:#f3ead9; color:#8a5a1a; }
    .chip--star{ background:#fdf6e3; color:var(--gold); }
    .linea{ color:var(--muead); }
    .nota{ color:#a06a2c; font-size:12px; }
    .row--revisar td{ background:#fffaf0; }
    .row--revisar:hover td{ background:#fff4dc; }
    .foot{ text-align:center; color:#bdb6a9; font-size:11px; margin-top:40px; }
  </style>
</head>
<body>
  <div class="top">
    <h1>Planilla de stock <small>La Melange · vajilla para eventos</small></h1>
    <span class="live"><span class="dot"></span> En vivo · se actualiza solo</span>
    <div class="stats">
      <span><b id="nProd">—</b>piezas</span>
      <span><b id="nCat">—</b>categorías</span>
      <span><b id="nRev">—</b>a revisar</span>
      <span><b id="upd">—</b>actualizado</span>
    </div>
  </div>
  <div class="wrap" id="content">Cargando…</div>

  <script>
    var LAST = '';
    function parseCSV(text){
      var rows=[], row=[], cur='', q=false;
      for(var i=0;i<text.length;i++){
        var c=text[i];
        if(q){
          if(c==='"'){ if(text[i+1]==='"'){cur+='"';i++;} else q=false; }
          else cur+=c;
        } else {
          if(c==='"') q=true;
          else if(c===','){ row.push(cur); cur=''; }
          else if(c==='\n'){ row.push(cur); rows.push(row); row=[]; cur=''; }
          else if(c==='\r'){}
          else cur+=c;
        }
      }
      if(cur!==''||row.length){ row.push(cur); rows.push(row); }
      return rows.filter(function(r){ return r.some(function(x){return x.trim()!=='';}); });
    }

    function render(rows){
      var head = rows[0], data = rows.slice(1);
      var cats = [], byCat = {};
      data.forEach(function(r){
        var cat = (r[0]||'').trim() || '—';
        if(!byCat[cat]){ byCat[cat]=[]; cats.push(cat); }
        byCat[cat].push(r);
      });
      var nProd=0, nRev=0;
      var html = '';
      cats.forEach(function(cat){
        var items = byCat[cat];
        // contar como "pieza" solo filas con modelo real
        var piezas = items.filter(function(r){ return (r[2]||'').trim() && (r[2]||'').indexOf('(')!==0; });
        nProd += piezas.length;
        html += '<div class="cat"><h2 class="cat__h">'+cat+' <span>'+piezas.length+' piezas</span></h2>'
          + '<table><thead><tr><th>Línea</th><th>Modelo</th><th>Material</th><th>Stock</th><th>Tipo</th><th>Notas</th></tr></thead><tbody>';
        items.forEach(function(r){
          var linea=(r[1]||'').trim(), modelo=(r[2]||'').trim(), material=(r[3]||'').trim(),
              stock=(r[4]||'').trim(), mm=(r[5]||'').trim(), star=(r[6]||'').trim(), nota=(r[7]||'').trim();
          var revisar = nota.indexOf('?')>=0 || nota.indexOf('confirmar')>=0 || nota.indexOf('❓')>=0 || linea.indexOf('❓')>=0;
          if(revisar && modelo) nRev++;
          var tipo = '';
          if(/sí/i.test(mm)) tipo += '<span class="chip chip--mm">mix &amp; match</span> ';
          if(/sí/i.test(star)) tipo += '<span class="chip chip--star">★ destacado</span>';
          html += '<tr class="'+(revisar?'row--revisar':'')+'">'
            + '<td class="linea">'+esc(linea)+'</td>'
            + '<td class="modelo">'+esc(modelo)+'</td>'
            + '<td>'+esc(material)+'</td>'
            + '<td class="stock'+(stock?'':' empty')+'">'+(stock||'—')+'</td>'
            + '<td>'+tipo+'</td>'
            + '<td class="nota">'+esc(nota)+'</td></tr>';
        });
        html += '</tbody></table></div>';
      });
      document.getElementById('content').innerHTML = html;
      document.getElementById('nProd').textContent = nProd;
      document.getElementById('nCat').textContent = cats.length;
      document.getElementById('nRev').textContent = nRev;
      var d=new Date();
      document.getElementById('upd').textContent = d.toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    }
    function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // Datos incrustados: así el archivo funciona con doble click (sin servidor).

    render(parseCSV(CSV_DATA));
  </script>
