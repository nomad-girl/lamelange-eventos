<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>La Melange — Catálogo (estática 4:5)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFFFF; --bg-2:#F6F4F1; --ink:#1A1A1A; --muted:#6F6A64; --accent:#2C3E50;
    --serif:"Playfair Display",Georgia,serif;
    --sans:"Montserrat",-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:#555;font-family:var(--sans);}
  .ad{width:1080px;height:1350px;background:var(--bg);position:relative;overflow:hidden;}

  /* grilla de mesas (arriba) */
  .grid{position:absolute;top:0;left:0;right:0;height:892px;
    display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:6px;background:#fff;}
  .cell{background:var(--bg-2) center/cover no-repeat;}
  .cell.a{background-image:url('assets/05-mesas-montadas/premium/premium-1.jpg');}
  .cell.b{background-image:url('assets/05-mesas-montadas/romantic/romantic-2.jpg');}
  .cell.c{background-image:url('assets/05-mesas-montadas/blue-white/blue-white-1.jpg');background-position:center 42%;}
  .cell.d{background-image:url('assets/05-mesas-montadas/negra-mm/negra-mm-2.jpg');}

  /* panel inferior */
  .panel{position:absolute;left:0;right:0;bottom:0;height:458px;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 84px;}
  .wm{margin-bottom:26px;}
  .wm b{display:block;font-family:var(--serif);font-weight:400;font-size:26px;letter-spacing:8px;
    text-transform:uppercase;line-height:1;color:var(--ink);}
  .wm small{display:block;font-family:var(--sans);font-weight:300;font-size:11px;letter-spacing:7px;
    text-transform:uppercase;color:var(--muted);margin-top:7px;}
  .eyebrow{font-family:var(--sans);font-weight:400;font-size:20px;letter-spacing:6px;
    text-transform:uppercase;color:var(--accent);}
  .headline{font-family:var(--serif);font-weight:400;font-size:56px;line-height:1.12;color:var(--ink);
    margin:18px 0 16px;max-width:15ch;}
  .cats{font-family:var(--sans);font-weight:300;font-size:22px;letter-spacing:1px;color:var(--muted);}
  .btn{display:inline-flex;align-items:center;font-family:var(--sans);font-weight:400;font-size:20px;
    letter-spacing:4px;text-transform:uppercase;padding:22px 52px;border:1.5px solid var(--ink);
    color:var(--ink);margin-top:30px;}
</style>
</head>
<body>
  <section class="ad">
    <div class="grid">
      <div class="cell a"></div>
      <div class="cell b"></div>
      <div class="cell c"></div>
      <div class="cell d"></div>
    </div>
    <div class="panel">
      <div class="wm"><b>La Melange</b><small>Eventos</small></div>
      <span class="eyebrow">Catálogo curado</span>
      <h1 class="headline">Piezas únicas para cada mesa</h1>
      <div class="cats">Vajilla · Cristalería · Cubertería · Ambientación</div>
      <a class="btn">Explorá el catálogo</a>
    </div>
  </section>
</body>
</html>
