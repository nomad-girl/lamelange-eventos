</head>
<body>

  <header class="nav">
    <div class="wrap nav__inner">
      <a href="index.html" class="brand"><img src="assets/00-marca/logo.png" class="brand__logo" alt="La Melange" /><small>Vajilla para eventos</small></a>
      <nav class="nav__links" id="navLinks">
        <a href="catalogo.html">Catálogo</a>
        <a href="index.html#mesas">Mesas armadas</a>
        <a href="tea-party.html">Tea Party</a>
        <a href="index.html#profesionales">Profesionales</a>
        <a href="index.html#contacto">Contacto</a>
        <a href="solicitud.html" class="nav__cta">Mi presupuesto</a>
      </nav>
      <button class="nav__toggle" id="navToggle" aria-label="Menú">☰</button>
    </div>
  </header>

  <main class="wrap pdp" id="pdp"><!-- render por JS --></main>

  <footer class="footer">
    <div class="wrap">
      <div class="footer__bottom" style="border:0; padding-top:0;">
        <span>© La Melange · Vajilla para eventos</span>
        <a href="catalogo.html">Volver al catálogo</a>
      </div>
    </div>
  </footer>

  <a class="wa" id="waFloat" href="#" aria-label="WhatsApp">
    <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 0-8.6 15l-1.3 4.7 4.8-1.3A10 10 0 1 0 12 2zm5.8 14.2c-.2.6-1.2 1.2-1.7 1.2-.5.1-1 .2-3.2-.7-2.7-1.1-4.4-3.9-4.6-4-.1-.2-1-1.4-1-2.6s.6-1.8.9-2c.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5l.8 2c.1.2.1.4 0 .5l-.4.5-.3.4c-.1.1-.3.3-.1.5l.9 1.4c.6.9 1.3 1.2 1.6 1.4.3.1.5.1.6-.1l.7-.9c.2-.2.4-.2.6-.1l1.9.9c.2.1.4.2.5.3.1.3.1.6-.1 1z"/></svg>
  </a>

  <script src="data.js?v=107"></script>
  <script src="analytics.js?v=107"></script>
  <script src="cart.js?v=107"></script>
  <script src="ambiente.js?v=107"></script>
  <script src="pdpView.js?v=107"></script>
  <script>
  (function () {
    var id = new URLSearchParams(location.search).get('id');
    var p = id ? buscarProducto(id) : null;
    var root = document.getElementById('pdp');

    if (!p) {
      root.innerHTML = '<div class="pdp-empty"><h2>Producto no encontrado</h2><p>Puede que el enlace esté viejo.</p><a class="btn btn--solid" href="catalogo.html">Ir al catálogo</a></div>';
    } else {
      document.title = p.nombre + ' · La Melange';
      var back = document.createElement('button');
      back.className = 'pdp-back'; back.type = 'button'; back.textContent = '← Volver';
      back.addEventListener('click', function () { if (history.length > 1) history.back(); else location.href = 'catalogo.html'; });
      root.appendChild(back);
      var col = (COLECCIONES.filter(function (c) { return c.id === p.coleccion; })[0] || {}).nombre || '';
      var crumbs = document.createElement('nav');
      crumbs.className = 'pdp-crumbs';
      crumbs.innerHTML = '<a href="catalogo.html">Catálogo</a> › <a href="catalogo.html#' + p.coleccion + '">' + col + '</a> › <span>' + p.nombre + '</span>';
      root.appendChild(crumbs);
      var body = document.createElement('div');
      root.appendChild(body);
      renderPDP(p, body); /* sin onNavigate: "combiná con" navega de página */
    }

    var waF = document.getElementById('waFloat');
    if (waF) waF.href = 'https://wa.me/' + (typeof WSP !== 'undefined' ? WSP : '5491167199527') + '?text=' + encodeURIComponent('¡Hola!');
    var t = document.getElementById('navToggle');
    if (t) t.addEventListener('click', function () { document.getElementById('navLinks').classList.toggle('open'); });
  })();
  </script>
</body>
</html>
