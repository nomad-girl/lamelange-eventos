<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<title>Catalogo La Melange</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FFFFFF; --bg-2:#F6F4F1; --bg-3:#ECE6DE;
    --ink:#1A1A1A; --muted:#8A8378; --accent:#2C3E50;
    --serif:"Playfair Display", Georgia, serif;
    --sans:"Montserrat", -apple-system, "Segoe UI", sans-serif;
  }
  @page{ size:A4; margin:14mm 14mm 15mm; }
  *{ box-sizing:border-box; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
  html,body{ margin:0; padding:0; }
  body{ font-family:var(--sans); color:var(--ink); font-weight:300; }
  img{ display:block; }

  /* ---------- Portada ---------- */
  .cover{
    height:267mm; page-break-after:always;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; position:relative;
  }
  .cover__logo{ width:150px; margin-bottom:34px; }
  .cover__eyebrow{ font-size:.62rem; letter-spacing:.42em; text-transform:uppercase; color:var(--muted); }
  .cover__title{ font-family:var(--serif); font-weight:400; font-size:3.6rem; letter-spacing:.02em; margin:.32em 0 .12em; }
  .cover__sub{ font-family:var(--serif); font-style:italic; font-size:1.35rem; color:var(--accent); margin-bottom:26px; }
  .cover__rule{ width:56px; height:1px; background:var(--ink); opacity:.5; margin:22px auto; }
  .cover__meta{ font-size:.66rem; letter-spacing:.28em; text-transform:uppercase; color:var(--muted); line-height:2.1; }
  .cover__foot{ position:absolute; bottom:4mm; left:0; right:0; font-size:.58rem; letter-spacing:.3em; text-transform:uppercase; color:var(--muted); }

  /* ---------- Manifiesto / intro inspiración ---------- */
  .intro{ page-break-before:always; page-break-after:always; }
  .intro__hero{ width:100%; height:150mm; object-fit:cover; background:var(--bg-3); border-radius:2px; }
  .intro__body{ text-align:center; padding:24px 14mm 0; }
  .intro__kicker{ font-size:.58rem; letter-spacing:.36em; text-transform:uppercase; color:var(--muted); }
  .intro__title{ font-family:var(--serif); font-weight:400; font-size:2.3rem; margin:.25em 0 .5em; }
  .intro__text{ font-size:.82rem; line-height:1.85; color:#4a4a4a; max-width:135mm; margin:0 auto; }

  /* ---------- Divisor de sección ---------- */
  .divider{ page-break-before:always; page-break-after:avoid; text-align:center; padding-top:36mm; }
  .divider .k{ font-size:.6rem; letter-spacing:.4em; text-transform:uppercase; color:var(--muted); }
  .divider h2{ font-family:var(--serif); font-weight:400; font-size:2.6rem; margin:.2em 0; }
  .divider p{ font-size:.78rem; color:#4a4a4a; line-height:1.8; max-width:120mm; margin:.4em auto 0; }
  .divider .rule{ width:56px; height:1px; background:var(--ink); opacity:.4; margin:20px auto 0; }

  /* ---------- LOOK / mesa curada (una pagina) ---------- */
  .look{ page-break-before:always; page-break-inside:avoid; }
  .look__head{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:12px; }
  .look__head .n{ font-size:.58rem; letter-spacing:.3em; text-transform:uppercase; color:var(--muted); }
  .look__head h3{ font-family:var(--serif); font-weight:400; font-size:2rem; margin:0; }
  .look__hero{ width:100%; height:135mm; object-fit:cover; background:var(--bg-3); border-radius:2px; }
  .look__desc{ font-size:.82rem; line-height:1.75; color:#4a4a4a; margin:14px 0 0; max-width:150mm; }
  .look__thumbs{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:12px; }
  .look__thumbs img{ width:100%; height:52mm; object-fit:cover; background:var(--bg-3); border-radius:2px; }
  .look__thumbs.two{ grid-template-columns:repeat(2,1fr); }
  .look__thumbs.two img{ height:60mm; }
  .look__piezas{ margin-top:14px; font-size:.68rem; letter-spacing:.02em; color:var(--ink); }
  .look__piezas b{ font-weight:500; color:var(--accent); text-transform:uppercase; letter-spacing:.14em; font-size:.6rem; }

  /* ---------- Grid de productos ---------- */
  .section-head{ page-break-before:always; page-break-after:avoid; margin:2px 0 16px; }
  .section-head .kicker{ font-size:.58rem; letter-spacing:.34em; text-transform:uppercase; color:var(--muted); }
  .section-head h2{ font-family:var(--serif); font-weight:400; font-size:1.9rem; margin:.15em 0 0; }
  .section-head .count{ font-size:.62rem; letter-spacing:.18em; text-transform:uppercase; color:var(--accent); margin-top:6px; }
  .section-head .rule{ height:1px; background:var(--bg-3); margin-top:12px; }

  .grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:13px; }
  .card{ page-break-inside:avoid; }
  .card__ph{ width:100%; aspect-ratio:1/1; background:var(--bg-3); overflow:hidden; border-radius:2px; display:flex; align-items:center; justify-content:center; }
  .card__ph img{ width:100%; height:100%; object-fit:cover; }
  .card__ph .noimg{ font-size:.55rem; letter-spacing:.24em; text-transform:uppercase; color:var(--muted); }
  .card__name{ font-family:var(--serif); font-size:1rem; line-height:1.2; margin:9px 0 3px; }
  .card__mat{ font-size:.66rem; color:var(--muted); line-height:1.35; }
  .card__stock{ font-size:.63rem; color:var(--accent); margin-top:5px; }
  .card__tags{ margin-top:6px; display:flex; flex-wrap:wrap; gap:4px; }
  .card__tags span{ font-size:.5rem; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); border:1px solid var(--bg-3); border-radius:100px; padding:2px 7px; }

  .end{ page-break-before:always; text-align:center; padding-top:70mm; }
  .end h3{ font-family:var(--serif); font-weight:400; font-size:1.9rem; }
  .end p{ font-size:.72rem; letter-spacing:.05em; color:var(--muted); line-height:2; }
  .end a{ color:var(--accent); text-decoration:none; }
</style>
</head>
<body>
  <div id="app"></div>

  <script src="../data.js"></script>
  <script>
    var A = 'assets/05-mesas-montadas/';
    // Mesas curadas -> el corazon inspiracional del catalogo
    var LOOKS = [
      { nombre:'Romántico',
        desc:'Rosas empolvados, bordes festoneados y detalles de puntilla. La mesa más delicada de la casa: pensada para bodas íntimas y celebraciones que buscan dulzura sin perder la elegancia.',
        piezas:'Perla rosa · Rosa puntilla · Cerámica rosa · Cristalería con pie de color',
        hero:A+'romantic/romantic-2.jpg',
        thumbs:[A+'romantic/romantic-1.jpeg',A+'romantic/romantic-3.jpg',A+'romantic/romantic-5.jpg'] },
      { nombre:'Luxury Gold',
        desc:'Porcelana de borde dorado y cristalería fina bajo la luz de las velas. Una mesa de alto impacto para eventos formales y grandes celebraciones que piden brillo.',
        piezas:'Luxury Gold · Luxury White · Cubertería Oro Premium · Copas borde oro',
        hero:A+'luxury/luxury-1.jpg',
        thumbs:[A+'luxury/luxury-2.jpg',A+'luxury/luxury-3.jpg'] },
      { nombre:'Blue & White',
        desc:'El clásico azul y blanco inglés en mix & match vintage: cada plato es distinto y todos conversan entre sí. Una mesa con historia, coleccionada pieza por pieza.',
        piezas:'Familia Blue & White (mix & match) · Platos de sitio · Cristalería transparente',
        hero:A+'blue-white/blue-white-1.jpg',
        thumbs:[A+'blue-white/blue-white-2.jpg'] },
      { nombre:'Campestre',
        desc:'Fibras naturales, verdes frescos y una elegancia relajada. Yute, palma y cerámica con relieve para eventos al aire libre, almuerzos de campo y celebraciones de día.',
        piezas:'Platos de sitio Yute y Palma · Relieve verde · Cristalería verde',
        hero:A+'country/country-1.jpg',
        thumbs:[A+'country/country-2.jpg',A+'country/country-3.jpg'] },
      { nombre:'Negra · Mix & Match',
        desc:'Negro moderno y contrastes gráficos. Una propuesta contemporánea que rompe con lo esperado, ideal para cenas de noche, eventos de diseño y mesas de autor.',
        piezas:'Cerámica Negro · Joy · Net · Cubertería Black & Gold',
        hero:A+'negra-mm/negra-mm-1.jpg',
        thumbs:[A+'negra-mm/negra-mm-2.jpg',A+'negra-mm/negra-mm-3.jpg',A+'negra-mm/negra-mm-4.jpg'] },
      { nombre:'Premium',
        desc:'Blanco impecable con un hilo dorado. La base más versátil y atemporal: combina con cualquier paleta y se adapta tanto a lo clásico como a lo moderno.',
        piezas:'Línea Premium · Cubertería Oro · Copas Adagio',
        hero:A+'premium/premium-1.jpg',
        thumbs:[A+'premium/premium-2.jpg'] }
    ];

    var LABEL = { cargadores:'Platos de sitio', platos:'Platos', cubiertos:'Cubertería', cristaleria:'Cristalería', plateria:'Platería' };
    var orden = (typeof COLECCIONES !== 'undefined') ? COLECCIONES.map(function(c){return c.id;}) : ['cargadores','platos','cubiertos','cristaleria','plateria'];

    function fallbackImg(){ return "this.onerror=null;this.style.display='none';this.parentNode.style.background='var(--bg-3)'"; }

    function stockLinea(p){
      if(!p.piezas || !p.piezas.length) return '';
      return p.piezas.map(function(x){
        var n=(x.s===undefined||x.s===null)?'—':x.s; return x.t?(x.t+' ×'+n):('×'+n);
      }).join('  ·  ');
    }
    function tarjeta(p){
      var foto=(p.fotos&&p.fotos.length)?p.fotos[0]:'';
      var img=foto?('<img src="../'+foto+'" onerror="this.parentNode.innerHTML=\'<span class=noimg>Foto pendiente</span>\'">'):'<span class="noimg">Foto pendiente</span>';
      var tags=(p.tags||[]).slice(0,4).map(function(t){return '<span>'+t+'</span>';}).join('');
      var stock=stockLinea(p);
      return '<div class="card"><div class="card__ph">'+img+'</div>'+
        '<div class="card__name">'+p.nombre+'</div>'+
        '<div class="card__mat">'+(p.material||'')+'</div>'+
        (stock?'<div class="card__stock">'+stock+'</div>':'')+
        '<div class="card__tags">'+tags+'</div></div>';
    }
    function lookHTML(l,i){
      var two=l.thumbs.length<=2?' two':'';
      var thumbs=l.thumbs.map(function(t){return '<img src="../'+t+'" onerror="'+fallbackImg()+'">';}).join('');
      var num=('0'+(i+1)).slice(-2);
      return '<div class="look">'+
        '<div class="look__head"><h3>'+l.nombre+'</h3><div class="n">Mesa '+num+'</div></div>'+
        '<img class="look__hero" src="../'+l.hero+'" onerror="'+fallbackImg()+'">'+
        '<p class="look__desc">'+l.desc+'</p>'+
        '<div class="look__thumbs'+two+'">'+thumbs+'</div>'+
        '<div class="look__piezas"><b>En esta mesa</b> &nbsp; '+l.piezas+'</div>'+
      '</div>';
    }

    var app=document.getElementById('app');
    var hoy=new Date().toLocaleDateString('es-AR',{year:'numeric',month:'long'});
    var total=PRODUCTOS.length;

    // 1 · Portada
    app.insertAdjacentHTML('beforeend',
      '<div class="cover">'+
        '<img class="cover__logo" src="../assets/logo.png" onerror="this.style.display=\'none\'">'+
        '<div class="cover__eyebrow">La Mélange · Eventos</div>'+
        '<div class="cover__title">Catálogo</div>'+
        '<div class="cover__sub">Vajilla &amp; mesas curadas para eventos boutique</div>'+
        '<div class="cover__rule"></div>'+
        '<div class="cover__meta">'+total+' modelos · '+hoy+'<br>lamelangeantiques.com</div>'+
        '<div class="cover__foot">Alquiler de piezas · Buenos Aires</div>'+
      '</div>');

    // 2 · Manifiesto con hero
    app.insertAdjacentHTML('beforeend',
      '<div class="intro">'+
        '<img class="intro__hero" src="../'+LOOKS[0].hero+'" onerror="'+fallbackImg()+'">'+
        '<div class="intro__body">'+
          '<div class="intro__kicker">La Mélange · Eventos</div>'+
          '<div class="intro__title">Cada mesa, una historia</div>'+
          '<p class="intro__text">No alquilamos vajilla suelta: componemos mesas. Más de '+total+' modelos de platos, cristalería y cubertería —muchos vintage, coleccionados pieza por pieza— listos para armar ambientes con carácter. En las próximas páginas, seis estilos curados para inspirar tu próximo evento; después, el catálogo completo pieza por pieza.</p>'+
        '</div>'+
      '</div>');

    // 3 · Divisor inspiración
    app.insertAdjacentHTML('beforeend',
      '<div class="divider"><div class="k">Inspiración</div><h2>Mesas &amp; Estilos</h2>'+
      '<p>Seis maneras de pensar una mesa. Cada estilo se arma con piezas de nuestro catálogo y se adapta a tu paleta, tu espacio y tu celebración.</p>'+
      '<div class="rule"></div></div>');

    // 4 · Looks
    LOOKS.forEach(function(l,i){ app.insertAdjacentHTML('beforeend', lookHTML(l,i)); });

    // 5 · Divisor catálogo
    app.insertAdjacentHTML('beforeend',
      '<div class="divider"><div class="k">Referencia</div><h2>El catálogo</h2>'+
      '<p>Todas las piezas disponibles, organizadas por colección. El stock indicado es orientativo; consultanos disponibilidad para tu fecha.</p>'+
      '<div class="rule"></div></div>');

    // 6 · Colecciones
    orden.forEach(function(cid){
      var items=PRODUCTOS.filter(function(p){return p.coleccion===cid;});
      if(!items.length) return;
      items.sort(function(a,b){return (b.destacado?1:0)-(a.destacado?1:0);});
      app.insertAdjacentHTML('beforeend',
        '<div class="section-head"><div class="kicker">La Mélange · Eventos</div>'+
        '<h2>'+(LABEL[cid]||cid)+'</h2>'+
        '<div class="count">'+items.length+' modelo'+(items.length>1?'s':'')+'</div>'+
        '<div class="rule"></div></div>'+
        '<div class="grid">'+items.map(tarjeta).join('')+'</div>');
    });

    // 7 · Cierre
    app.insertAdjacentHTML('beforeend',
      '<div class="end"><h3>Creemos tu mesa</h3>'+
      '<p>Reservas, disponibilidad y armado a medida<br>'+
      '<a>lamelangeantiques.com</a><br>La Mélange Antiques · Eventos · Buenos Aires</p></div>');

    window.__ready=true;
  </script>
</body>
</html>
